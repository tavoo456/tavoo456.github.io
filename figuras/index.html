<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figuras geometricas | Curso practico de js en platzi</title>
    <link rel="stylesheet" href="./figuras.css">
</head>
<body>
    <header>
        <h1>Figuras geometricas</h1>
        <p>Este el Primer taller del curso practico de javascript</p>
    </header>
    <main>
        <section>
            <h2>Calcula el area y perimetro de cuadradado</h2>
            <form>
                <label for="InputCuadrado">
                    Escribe cuanto mide cada lado de tu cuadrado:
                </label>
                <input id="InputCuadrado" type="number">
                <button type="button" onclick="CalcularPerimetroCuadrado()">
                    <span>Calcular el perimetro</span>
                </button>
                <button type="button" onclick="CalcularAreaCuadrado()">
                    <span>Calcular area</span>
                </button>
            </form>
        </section>
        <section>
            <h2>Calcula el area y perimetro de triangulos</h2>
            <form>
                <label for="InputTriangulo1">
                    Escribe cuanto mide el lado 1 del triangulo:
                </label>
                <input id="InputTriangulo1" type="number">
                <label for="InputTriangulo2">
                    Escribe cuanto mide el lado 2 del triangulo:
                </label>
                <input id="InputTriangulo2" type="number">
                <label for="InputTriangulo3">
                    Escribe cuanto la base del triangulo:
                </label>
                <input id="InputTriangulo3" type="number">
                <label for="InputTriangulo4">
                    Escribe cuanto mide la altura del triangulo:
                </label>
                <input id="InputTriangulo4" type="number">
                <button type="button" onclick="CalcularPerimetroTriangulo()">
                    <span>Calcular el perimetro</span>
                </button>
                <button type="button" onclick="CalcularAreaTriangulo()">
                    <span>Calcular area</span>
                </button>
            </form>
        </section>
        <section>
            <h2>Calcula el area y perimetro de un circulo</h2>
            <form>
                <label for="InputCirculo">
                    Escribe el radio de un circulo:
                </label>
                <input id="InputCirculo" type="number">
                <button type="button" onclick="CalcularPerimetroCirculo()">
                    <span>Calcular el perimetro</span>
                </button>
                <button type="button" onclick="CalcularAreaCuadrado()">
                    <span>Calcular area</span>
                </button>
            </form>
        </section>
    </main>
    <script src="./figuras.js"></script>
</body>
</html>
